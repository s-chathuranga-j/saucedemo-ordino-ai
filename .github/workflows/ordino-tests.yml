name: ordino playwright tests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  checks: write

jobs:
  run-tests:
    name: Shard ${{ matrix.shardIndex }} / 2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [ 1, 2 ]
    env:
      BASE_URL: ${{ vars.BASE_URL }}
      WORKERS: ${{ vars.WORKERS || '1' }}
      RETRIES: ${{ vars.RETRIES || '1' }}
    steps:
    - uses: ORDINO-AI-LLC/github-action/setup@v1
    - uses: ORDINO-AI-LLC/github-action/run-shard@v1
      with:
        shard-index: ${{ matrix.shardIndex }}
        total-shards: 2

  merge-reports:
    name: Merge & Publish Reports
    needs: [ run-tests ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: ORDINO-AI-LLC/github-action/setup@v1
    - uses: ORDINO-AI-LLC/github-action/merge-reports@v1
